<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Autodarts Modules — PDC TV Overlay</title>
  <link rel="icon" type="image/png" href="../../Main/assets/ICON.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,700;0,800;0,900;1,700;1,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="overlay.css" />
</head>
<body>
  <div class="overlayWrap" id="overlayRoot">
    <div
      class="pdcCard pdcCard--followTurn"
      id="liveOverlay"
      role="group"
      aria-label="Match scoreboard"
      data-name-scheme="pdcOfficial"
    >
      <div class="pdcMainRow">
        <div class="pdcStage">
          <!-- Oben: Namen. Unten: Sanduhr-SVG; Kreise überlagern die Naht. -->
          <div class="pdcNameRow">
            <div class="pdcNameCard pdcNameCard--left" id="nameCellLeft">
              <div class="pdcName pdcName--left">
                <div class="pdcNameStack">
                  <span class="pdcNameText" id="leftName">PLAYER 1</span>
                  <span class="pdcFlag" id="leftFlagEl" aria-hidden="true"></span>
                </div>
              </div>
            </div>
            <div class="pdcNameCard pdcNameCard--right pdcNameCard--throwing" id="nameCellRight">
              <div class="pdcName pdcName--right">
                <div class="pdcNameStack">
                  <span class="pdcNameText" id="rightName">PLAYER 2</span>
                  <span class="pdcFlag" id="rightFlagEl" aria-hidden="true"></span>
                </div>
              </div>
            </div>
          </div>

          <div class="pdcBottomBand">
            <svg
              class="pdcHourglassSvg"
              viewBox="0 -14 520 148"
              preserveAspectRatio="xMidYMid meet"
              aria-hidden="true"
              focusable="false"
            >
              <defs>
                <!-- Sende-Look: tiefes Graphit, leichter Petrol-Schimmer oben (kein 1:1 mit Sender-Assets) -->
                <linearGradient id="pdcHgGrad" x1="8%" y1="0%" x2="92%" y2="100%">
                  <stop offset="0%" stop-color="#1c2838" />
                  <stop offset="28%" stop-color="#141a24" />
                  <stop offset="55%" stop-color="#0f131a" />
                  <stop offset="100%" stop-color="#07090d" />
                </linearGradient>
                <!-- Rand: oben/unten Petrol-Akzent wie TV-Rim-Light, Seiten gedämpfter Stahl -->
                <linearGradient id="pdcSandStrokeGrad" x1="50%" y1="0%" x2="50%" y2="100%">
                  <stop offset="0%" stop-color="#5eead4" stop-opacity="0.45" />
                  <stop offset="22%" stop-color="#5a6a7e" stop-opacity="0.95" />
                  <stop offset="50%" stop-color="#3d4a5c" stop-opacity="0.88" />
                  <stop offset="78%" stop-color="#4a5868" stop-opacity="0.92" />
                  <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0.28" />
                </linearGradient>
              </defs>
              <!--
                R=66.39, Sehne x=119 / x=401 → cx_L=119-h, cx_R=401+h (h=√(r²−(y−60)²) an der Sehne).
                Scheitel: (cx, 60±r), nicht (119,13)! Brücke: T_L→T_R / B_L→B_R mit Taille (C).
              -->
              <path
                class="pdcHourglassPath"
                fill="url(#pdcHgGrad)"
                d="
                  M 72.05 -6.39
                  C 130 -6.39 200 14.5 260 16.8
                  C 320 14.5 390 -6.39 447.95 -6.39
                  A 66.39 66.39 0 1 0 447.95 126.39
                  C 390 126.39 320 108.3 260 105.8
                  C 200 108.3 130 126.39 72.05 126.39
                  A 66.39 66.39 0 1 0 72.05 -6.39
                  Z
                "
              />
            </svg>
            <div class="pdcDumbbellRow">
              <div class="pdcPod pdcPod--left" id="podLeft">
                <div class="pdcRingGlow" id="ringGlowLeft">
                  <div class="pdcRingArc" id="arcLeft" aria-hidden="true"></div>
                  <div class="pdcRing">
                    <div class="pdcRingInner">
                      <div class="pdcTurnBg" aria-hidden="true">
                        <svg class="pdcTurnArrow" viewBox="0 0 100 100" width="100%" height="100%" focusable="false">
                          <path fill="currentColor" d="M18 12 L82 50 L18 88 Z" />
                        </svg>
                      </div>
                      <div class="pdcScoreVal" id="leftScore">220</div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="pdcStatsFill">
                <div class="pdcCenter">
                  <div class="pdcLine pdcLine--format" id="firstToLine">FIRST TO 3</div>
                  <div class="pdcLine pdcLine--sets">
                    <span class="pdcNum" id="leftSets">0</span>
                    <span class="pdcLbl">SETS</span>
                    <span class="pdcNum" id="rightSets">0</span>
                  </div>
                  <div class="pdcLine pdcLine--legs">
                    <span class="pdcNum" id="leftLegs">0</span>
                    <span class="pdcLbl">LEGS</span>
                    <span class="pdcNum" id="rightLegs">0</span>
                  </div>
                </div>
              </div>

              <div class="pdcPod pdcPod--right" id="podRight">
                <div class="pdcRingGlow pdcRingGlow--right isTurn" id="ringGlowRight">
                  <div class="pdcRingArc pdcRingArc--right" id="arcRight" aria-hidden="true"></div>
                  <div class="pdcRing">
                    <div class="pdcRingInner">
                      <div class="pdcTurnBg pdcTurnBg--mirror" aria-hidden="true">
                        <svg class="pdcTurnArrow" viewBox="0 0 100 100" width="100%" height="100%" focusable="false">
                          <path fill="currentColor" d="M18 12 L82 50 L18 88 Z" />
                        </svg>
                      </div>
                      <div class="pdcScoreVal" id="rightScore">265</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <aside class="pdcCheckout pdcCheckout--right" id="checkoutCol" aria-label="Würfe aktueller Aufnahme">
          <div class="pdcDartBubble" id="bubble1">
            <span class="pdcDartBubbleTxt" id="chk1">T20</span>
          </div>
          <div class="pdcDartBubble" id="bubble2">
            <span class="pdcDartBubbleTxt" id="chk2">T19</span>
          </div>
          <div class="pdcDartBubble" id="bubble3">
            <span class="pdcDartBubbleTxt" id="chk3">D18</span>
          </div>
        </aside>
      </div>

      <div class="pdcFooter" id="footerLine">PDC WORLD SERIES</div>
    </div>
  </div>

  <script src="overlay.js"></script>
</body>
</html>

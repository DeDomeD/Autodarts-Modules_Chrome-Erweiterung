<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Autodarts Modules Overlay</title>
  <link rel="icon" type="image/png" href="../ICON.png" />
  <link rel="stylesheet" href="overlay.css" />
</head>
<body>
  <div class="overlayWrap" id="liveOverlay">
    <div class="overlayCard">
      <div class="topRow">
        <div class="nameSide left">
          <div class="nameText" id="leftName">DOBEY</div>
        </div>
        <div class="nameSide right">
          <div class="nameText" id="rightName">WATTIMENA</div>
        </div>
      </div>

      <div class="middleRow">
        <div class="leftCheckout">
          <div class="checkoutBox" id="leftC1">T20</div>
          <div class="checkoutBox" id="leftC2">T19</div>
          <div class="checkoutBox" id="leftC3">D18</div>
        </div>

        <div class="scoreRing left">
          <div class="scoreInner">
            <div class="scoreValue" id="leftScore">501</div>
          </div>
        </div>

        <div class="sideBoard left" aria-hidden="true">
          <div class="boardCol left">
            <span>45</span>
            <span>26</span>
            <span>60</span>
            <span>140</span>
          </div>
          <div class="boardCol right">
            <span>301</span>
            <span>256</span>
            <span>230</span>
            <span>170</span>
            <span>30</span>
          </div>
        </div>

        <div class="sideBoard right" aria-hidden="true">
          <div class="boardCol left">
            <span>45</span>
            <span>26</span>
            <span>60</span>
            <span>140</span>
          </div>
          <div class="boardCol right">
            <span>301</span>
            <span>256</span>
            <span>230</span>
            <span>170</span>
            <span>30</span>
          </div>
        </div>

        <div class="setCorner left" id="leftSetsCorner">0</div>
        <div class="setCorner right" id="rightSetsCorner">0</div>

        <div class="centerStats"></div>

        <div class="scoreRing right">
          <div class="scoreInner">
            <div class="scoreValue" id="rightScore">501</div>
          </div>
        </div>

        <div class="rightCheckout">
          <div class="checkoutBox" id="rightC1">T20</div>
          <div class="checkoutBox" id="rightC2">T19</div>
          <div class="checkoutBox" id="rightC3">D18</div>
        </div>
      </div>
    </div>
  </div>

  <script src="overlay.js"></script>
</body>
</html>
